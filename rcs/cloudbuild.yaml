steps:
  # Docker image build
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lediafane-lp:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lediafane-lp:latest'
      - '.'
  
  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/lediafane-lp']
  
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'lediafane-lp'
      - '--image=gcr.io/$PROJECT_ID/lediafane-lp:$COMMIT_SHA'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

images:
  - 'gcr.io/$PROJECT_ID/lediafane-lp:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/lediafane-lp:latest'

options:
  logging: CLOUD_LOGGING_ONLY
